<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./forms.js"></script>
</head>
<body>
    <form onsubmit="a(event)">
        <input type="text" name="username" placeholder="Enter Username" oninput="b(event)" onblur="c(event)">
        <input type="email" name="email" placeholder="Enter Email" oninput="b(event)" onblur="c(event)">
        <input type="text" name="password" placeholder="Enter Password" oninput="b(event)" onblur="c(event)">
        <select name="lang" placeholder="Select Lang" onchange="b(event)" onblur="c(event)">
            <option value="js">js</option>
            <option value="html">html</option>
            <option value="java">java</option>
            <option value="python">python</option>
        </select>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
